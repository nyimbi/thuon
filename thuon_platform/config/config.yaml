# config/config.yaml
database:
  host: 'localhost'
  port: 5432
  dbname: 'thuon_db'
  user: 'thuon_user'
  password: 'thuon_password'
api_keys: {}

search:
  searxng_url: 'https://search.lindela.io'
  searxng_categories: 'general'
  searxng_language: 'en'
  searxng_time_range: ''          # default: no filter; override per-call with time_range='day'
  firecrawl_url: 'http://84.247.181.100:3002'
ollama:
  endpoint: 'http://localhost:11434'
  model: 'qwen3.5:4b'
  chat_model: 'qwen3.5:4b'
  vision_model: 'minicpm-v:4.5'
vector_store:
  backend: 'chroma'           # chroma | weaviate | none
  chroma_path: 'thuon_platform/data/chroma'
  weaviate_url: ''            # set to http://host:8080 if using Weaviate

company:
  profile_dir: thuon_platform/data/company
  name: ''
  website: ''
  naics_codes: []
  rfp_keywords: []

obsidian:
  vault_path: ''
  inbox_folder: 'Thuon Inbox'
  rfp_folder: 'RFPs'
  blog_folder: 'Blog Posts'

neditor:
  ipc_queue_path: '~/.neditor/cli-open-queue.jsonl'
  webhook_secret: ''

website:
  url: ''
  site_repo_path: ''
  pages_to_refresh: []

scheduler:
  enabled: true
  rfp_discovery_interval_hours: 6
  blog_suggestions_day: 'monday'
  social_daily_hour: 8
  website_refresh_day: 'sunday'

notifications:
  retention_count: 50

# ── MCP (Model Context Protocol) ─────────────────────────────────────────────
# Thuon exposes all capabilities as MCP tools at POST /mcp (streamable-HTTP).
# Tools are named  thuon__<capability_name>  (double-underscore namespace).
#
# To wire Thuon into Claude Desktop add this to
# ~/Library/Application Support/Claude/claude_desktop_config.json:
#
#   "mcpServers": {
#     "thuon": {
#       "command": "uv",
#       "args": ["run", "python", "thuon_platform/thuon.py", "mcp"],
#       "env": {}
#     }
#   }
#
# Or, if running Thuon as a web server, use the SSE/HTTP transport:
#
#   "mcpServers": {
#     "thuon": {
#       "type": "http",
#       "url": "http://localhost:5000/mcp"
#     }
#   }
# ── LiteLLM proxy (ml server at 62.169.25.77) ────────────────────────────────
# Set api_base to the LiteLLM proxy URL to enable cloud model routing.
# Leave api_base empty to disable (all requests fall back to local Ollama).
litellm:
  api_base: ''                           # e.g. http://62.169.25.77:4000
  model: 'openai/gpt-4o-mini'           # default model for 'fast' tier
  fast_model: 'openai/gpt-4o-mini'
  strong_model: 'openai/gpt-4o'
  api_key: ''                            # proxy API key if required
  timeout: 120
  max_retries: 2

mcp:
  enabled: true
  endpoint: '/mcp'
  # stdio: run a lightweight stdio-transport wrapper instead of HTTP
  # Used by:  uv run python thuon_platform/thuon.py mcp
  stdio_enabled: false

# ── Fleet (sysadmin) ─────────────────────────────────────────────────────────
fleet:
