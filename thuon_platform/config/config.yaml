      ssh_user: root

    - hostname: ml
      ip: '62.169.25.77'
      role: ml
      tags: [production, ollama, litellm, openbao, libretranslate]
      ssh_user: root

    - hostname: mail
      ip: '217.76.53.144'
      role: mail
      tags: [production, stalwart, grafana, prometheus, loki, listmonk]
      ssh_user: root

    - hostname: search
      ip: '84.247.181.100'
