name: research_brief
description: Research a topic and produce a structured daily brief

steps:
  - name: research
    capability: research_assistant
    params:
      query: "{input.topic}"
      num_sources: 5

  - name: brief
    capability: daily_brief
    params:
      topics:
        - "{input.topic}"
      include_sections:
        - news_summary
        - action_items
